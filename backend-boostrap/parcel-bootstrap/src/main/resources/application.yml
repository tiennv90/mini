server:
  port: 9081
spring:
  application:
    name: parcel
  datasource:
    hikari:
      auto-commit: false   
    url: jdbc:postgresql://localhost:5435/parcel
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  sql:
   init:
    mode: always
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
