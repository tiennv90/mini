version: "3.9"

services:
  postgres:
   image: postgres:18.3
   container_name: postgres-parcel
   restart: always
   environment:
    POSTGRES_USER: admin
    POSTGRES_PASSWORD: admin
    POSTGRES_DB: parcel
   ports:
    - "5435:5432"  
   volumes:
    - postgres_data_2:/var/lib/postgresql
  
  redis:
    image: redis:alpine
    ports:
      - "6380:6379"
    command: redis-server --bind 0.0.0.0 --protected-mode no --save 20 1 --loglevel warning
  
volumes:
  postgres_data_2: