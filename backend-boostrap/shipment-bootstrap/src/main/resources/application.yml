server:
  port: 9080
spring:
  application:
    name: shipment
  datasource:
    hikari:
      auto-commit: false
    url: jdbc:postgresql://localhost:5436/shipment
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  sql:
   init:
    mode: always
  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
  kafka:
   bootstrap-servers: "localhost:39092,localhost:39093,localhost:39094"
   username: admin
   password: admin-secret
