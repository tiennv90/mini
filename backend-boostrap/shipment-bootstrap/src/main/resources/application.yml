server:
  port: 9080
spring:
  application:
    name: shipment
  datasource:
    url: jdbc:postgresql://localhost:5436/shipment
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  sql:
   init:
    mode: always
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
