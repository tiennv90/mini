version: "3.9"

services:
  postgres:
   image: postgres:18.3
   container_name: postgres18
   restart: always
   environment:
    POSTGRES_USER: admin
    POSTGRES_PASSWORD: admin
    POSTGRES_DB: mini
   ports:
    - "5433:5432"  
   volumes:
    - postgres_data:/var/lib/postgresql
  
  adminer:
    image: adminer:5.4.2
    container_name: adminer
    restart: always
    ports:
     - "8081:8080"
  
volumes:
  postgres_data: